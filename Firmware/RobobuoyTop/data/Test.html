<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Docking Layout</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #e6e6e6;
        margin: 0;
        padding: 15px;
        text-align: center;
    }

    .top-bar { display: flex; justify-content: space-between; }

    .title {
        font-size: 28px;
        font-weight: bold;
        margin-bottom: 10px;
    }

    .container {
        display: flex;
        justify-content: center;
        gap: 30px;
    }

    .side-panel {
        width: 80px;
        background: #f2f2f2;
        border: 1px solid #ccc;
        padding: 10px;
        border-radius: 8px;
    }

    .side-bar {
        width: 30px; height: 220px;
        background: #ccc;
        border-radius: 4px;
        position: relative;
        border: 1px solid #999;
        margin: 0 auto;
    }
    .side-fill {
        width: 100%;
        background: green;
        position: absolute;
        bottom: 0;
        height: 50%;
        border-radius: 4px;
    }

    .center-panel {
        width: 330px;
        background: #fff;
        border: 1px solid #bbb;
        padding: 15px;
        border-radius: 10px;
        position: relative;
    }

    .distance { float: left; font-size: 26px; color: red; font-weight: bold; }
    .time { float: right; font-size: 26px; color: purple; font-weight: bold; }

    .compass {
        width: 250px; height: 250px;
        border-radius: 50%;
        border: 3px solid black;
        margin: 55px auto 10px auto;
        position: relative;
    }

    .dir {
        position: absolute;
        font-size: 20px;
        font-weight: bold;
    }
    .n { top: -5px; left: 50%; transform: translateX(-50%); }
    .s { bottom: -5px; left: 50%; transform: translateX(-50%); }
    .e { top: 50%; right: -5px; transform: translateY(-50%); }
    .w { top: 50%; left: -5px; transform: translateY(-50%); }

    .needle {
        width: 4px;
        height: 95px;
        position: absolute;
        left: 50%;
        top: 30px;
        transform-origin: bottom center;
    }

    #needleMain { background: black; }
    #needleTarget { background: red; }
    #needleMag { background: green; }
    #needleWind { background: blue; }

    .battery-bar {
        width: 200px;
        height: 20px;
        background: #ccc;
        border-radius: 5px;
        border: 1px solid #777;
        margin: 10px auto;
        position: relative;
    }
    .battery-fill {
        height: 100%;
        width: 70%;
        background: green;
        border-radius: 5px;
    }

    .legend { margin-top: 10px; }
    .legend span { margin-right: 15px; }

    .buttons button {
        width: 100px;
        padding: 10px;
        margin: 5px;
        font-size: 16px;
        border-radius: 6px;
        cursor: pointer;
    }
    #btnLock.locked {
        background: green;
        color: white;
        border: 2px solid darkgreen;
    }

    #status {
        margin-top: 8px;
        font-size: 16px;
        font-weight: bold;
    }
</style>
</head>
<body>

<div class="top-bar">
    <div>Buoy: b7a5b578</div>
    <div>192.168.1.78</div>
</div>
