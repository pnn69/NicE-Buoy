<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Robobuoy Dashboard</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #e6e6e6;
        margin: 0;
        padding: 15px;
        text-align: center;
    }
    .top-bar {
        display: flex;
        justify-content: space-between;
        font-size: 14px;
        margin-bottom: 5px;
        padding: 0 10px;
    }
    .status-title {
        font-size: 28px;
        font-weight: bold;
        color: #003366;
        margin-bottom: 10px;
    }
    .container {
        display: flex;
        justify-content: center;
        gap: 30px;
        margin-bottom: 10px;
    }
    .side-panel {
        width: 80px;
        background: #f2f2f2;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
    }
    .side-bar {
        width: 30px;
        height: 220px;
        margin: 0 auto;
        background: #ccc;
        border-radius: 4px;
        border: 1px solid #999;
        position: relative;
    }
    .side-fill {
        width: 100%;
        background: green;
        position: absolute;
        bottom: 0;
        height: 50%; /* Default */
        border-radius: 4px;
    }
    .center-panel {
        width: 330px;
        background: white;
        padding: 15px;
        border-radius: 10px;
        border: 1px solid #bbb;
    }
    .distance {
        font-size: 28px;
        font-weight: bold;
        color: red;
        float: left;
    }
    .pid-i {
        font-size: 28px;
        font-weight: bold;
        color: purple;
        float: right;
    }
    .compass-container {
        width: 250px;
        height: 250px;
        border: 3px solid black;
        border-radius: 50%;
        margin: 55px auto 5px auto;
        position: relative;
        overflow: hidden; /* To keep arrows within bounds */
    }
    .compass-container .dir-label {
        position: absolute;
        font-weight: bold;
        font-size: 18px;
        color: #000;
    }
    .dir-label.n { top: -5px; left: 50%; transform: translateX(-50%); }
    .dir-label.s { bottom: -5px; left: 50%; transform: translateX(-50%); }
    .dir-label.e { right: -5px; top: 50%; transform: translateY(-50%); }
    .dir-label.w { left: -5px; top: 50%; transform: translateY(-50%); }

    .battery-bar-container {
        width: 200px;
        height: 20px;
        background: #ccc;
        border-radius: 5px;
        border: 1px solid #777;
        margin: 15px auto;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 5px;
    }
    .battery-fill {
        height: 100%;
        width: 70%; /* Default */
        background: green;
        border-radius: 5px;
        position: absolute;
        left: 0;
        top: 0;
    }

    .legend {
        margin-top: 10px;
        font-size: 14px;
    }
    .legend span {
        margin-right: 15px;
    }

    .buttons {
        margin-top: 10px;
    }
    .buttons button {
        width: 100px;
        padding: 10px;
        margin: 5px;
        font-size: 16px;
        border-radius: 6px;
        border: 1px solid #888;
        background: #eee;
        cursor: pointer;
    }
    .buttons button:disabled {
        background: #ccc;
        cursor: not-allowed;
    }
</style>
</head>
<body>

<div class="tab">
  <button class="tablinks active" onclick="openTab(event, 'Buoy1')" id="btn_buoy1">Buoy 1</button>
  <button class="tablinks" onclick="openTab(event, 'Buoy2')" id="btn_buoy2">Buoy 2</button>
  <button class="tablinks" onclick="openTab(event, 'Buoy3')" id="btn_buoy3">Buoy 3</button>
</div>

<div id="BuoyDisplay">
  <!-- Content for the currently selected buoy will be injected here by JavaScript -->
</div>

<script>
let currentBuoyData = {}; // Store data for all buoys
let currentActiveBuoyId = 1; // Default to showing Buoy 1

function openTab(evt, buoyId) {
  currentActiveBuoyId = parseInt(buoyId.replace('Buoy',''));
  updateBuoyDisplay();

  // Update active button styling
  let tablinks = document.getElementsByClassName("tablinks");
  for (let i = 0; i < tablinks.length; i++) tablinks[i].className = tablinks[i].className.replace(" active", "");
  if(evt) evt.currentTarget.className += " active";
}

function drawWindrose(canvasId, mag, tg, wind, gps) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const cw = canvas.width;
    const ch = canvas.height;
    const cx = cw / 2;
    const cy = ch / 2;
    const r = cx * 0.75;

    ctx.clearRect(0, 0, cw, ch); // Clear previous drawings

    // Main circle
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, 2 * Math.PI);
    ctx.strokeStyle = '#ccc';
    ctx.stroke();

    function drawArrow(angle, color, length, width) {
        if (angle === undefined || angle === null || angle === "" || isNaN(parseFloat(angle))) {
            return;
        }
        const rad = (parseFloat(angle) - 90) * Math.PI / 180;
        ctx.beginPath();
        ctx.lineWidth = width;
        ctx.strokeStyle = color;
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + length * Math.cos(rad), cy + length * Math.sin(rad));
        ctx.stroke();
        // Arrow head
        ctx.beginPath();
        ctx.arc(cx + length * Math.cos(rad), cy + length * Math.sin(rad), width, 0, 2*Math.PI);
        ctx.fillStyle = color;
        ctx.fill();
    }

    drawArrow(tg, 'red', r, 4);
    drawArrow(mag, 'green', r * 0.9, 3);
    drawArrow(wind, 'blue', r * 0.7, 2);
    drawArrow(gps, 'black', r * 0.8, 2);

    // Cardinal labels (Drawn after arrows to stay on top)
    ctx.fillStyle = '#000';
    ctx.font = 'bold 12px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('N', cx, cy - r - 5);
    ctx.fillText('S', cx, cy + r + 15);
    ctx.fillText('E', cx + r + 10, cy + 5);
    ctx.fillText('W', cx - r - 10, cy + 5);
}

function drawBar(canvasId, value, fillColor, showPercentage = true) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const cw = canvas.width;
    const ch = canvas.height;
    const mid = ch / 2;

    ctx.clearRect(0, 0, cw, ch); // Clear previous drawings
    ctx.fillStyle = '#eee';
    ctx.fillRect(0, 0, cw, ch); // Draw background
    
    // Center line
    ctx.beginPath();
    ctx.moveTo(0, mid);
    ctx.lineTo(cw, mid);
    ctx.strokeStyle = '#999';
    ctx.lineWidth = 1;
    ctx.stroke();

    if (value !== undefined && value !== null && value !== "" && !isNaN(parseFloat(value))) {
        const val = parseFloat(value);
        const h = (Math.abs(val) / 100) * mid; // Max height is half the bar for 100%
        ctx.fillStyle = fillColor; // Use passed fill color
        if (val > 0) {
            ctx.fillRect(0, mid - h, cw, h);
        } else if (val < 0) {
            ctx.fillRect(0, mid, cw, h);
        }
    }
}

function getStatusText(status) {
    const s = String(status).trim();
    if (s === "7") return "IDLE";
    if (["12", "13", "14"].includes(s)) return "LOCKED";
    if (["15", "16", "17"].includes(s)) return "DOCKING";
    if (s === "25") return "REMOTE";
    if (s === "49") return "SETUP";
    return "STATUS " + s;
}

function sendCommand(buoyId, commandType) {
    console.log(`Sending command: ${commandType} to Buoy ${buoyId}`);
    // In a real scenario, this would send an HTTP request to the ESP32
    // For example:
    // fetch(`/command?id=${buoyId}&type=${commandType}`);
    // For local testing, we just log the action.
}

// Function to update the main display for the currently active buoy
function updateBuoyDisplay() {
    const bid = currentActiveBuoyId;
    const buoy = currentBuoyData[bid];
    const displayDiv = document.getElementById('BuoyDisplay');

    if (!buoy) {
        displayDiv.innerHTML = `<div class="card"><h3>Buoy ${bid} (Waiting for data...)</h3></div>`;
        return;
    }

    const statusText = getStatusText(buoy.Status);
    const tgDist = parseFloat(buoy.TgDist);
    const pidI = parseFloat(buoy.PIDI);

    // Determine button states
    const isIdle = String(buoy.Status).trim() === "7";
    const isLocked = ["12", "13", "14"].includes(String(buoy.Status).trim());
    const isDocking = ["15", "16", "17"].includes(String(buoy.Status).trim());
    const isFar = tgDist > 5.0;
    const isClose = tgDist <= 5.0;

    // Generate HTML for the buoy
    displayDiv.innerHTML = `
        <div class="card">
            <div class="top-bar">
                <div>Buoy: ${buoy.ID}</div>
                <div>${buoy.IP || 'N/A'}</div> <!-- Assuming IP comes with data -->
            </div>

            <div class="status-title">${statusText}</div>

            <div class="container">
                <!-- Left Panel -->
                <div class="side-panel">
                    <div>BB</div>
                    <canvas id="bb_bar_canvas_${bid}" class="side-bar" width="30" height="220"></canvas>
                    <div id="bb_perc_label_${bid}">0%</div>
                </div>

                <!-- Center Panel -->
                <div class="center-panel">
                    <div style="overflow: auto; margin-bottom: 10px;">
                        <div class="distance">${!isNaN(tgDist) && tgDist !== 0 ? tgDist.toFixed(2) + 'm' : '-'}</div>
                        <div class="pid-i">${!isNaN(pidI) && pidI !== 0 ? 'I:' + pidI.toFixed(2) : ''}</div>
                    </div>

                    <div id="compass_container_${bid}" class="compass-container">
                        <canvas id="compass_canvas_${bid}" width="250" height="250" style="background:white;"></canvas>
                         <div class="dir-label n">N</div>
                         <div class="dir-label s">S</div>
                         <div class="dir-label e">E</div>
                         <div class="dir-label w">W</div>
                    </div>

                    <div class="battery-bar-container">
                        <span>17V</span>
                        <div style="flex-grow:1; height:100%; position:relative;">
                            <div id="battery_fill_${bid}" class="battery-fill" style="width:${buoy.SubPerc || 0}%; background:${buoy.SubPerc > 20 ? 'green' : 'red'}"></div>
                        </div>
                        <span>25V</span>
                    </div>

                    <div class="legend">
                        <span style="color:red;">&#9632; Target</span>
                        <span style="color:green;">&#9632; Mag</span>
                        <span style="color:blue;">&#9632; Wind</span>
                        <span style="color:black;">&#9632; GPS</span>
                    </div>
                </div>

                <!-- Right Panel -->
                <div class="side-panel">
                    <div>SB</div>
                    <canvas id="sb_bar_canvas_${bid}" class="side-bar" width="30" height="220"></canvas>
                    <div id="sb_perc_label_${bid}">0%</div>
                </div>
            </div>

            <div class="buttons">
                <button id="lock_btn_${bid}" onclick="sendCommand(${bid}, 'LOCK')">LOCK</button>
                <button id="dock_btn_${bid}" onclick="sendCommand(${bid}, 'DOCK')">DOCK</button>
                <button id="setup_btn_${bid}" onclick="sendCommand(${bid}, 'SETUP')">SETUP</button>
            </div>
        </div>
    `;

    // Update bar percentages and colors
    const bbPerc = parseFloat(buoy.BB || 0);
    const sbPerc = parseFloat(buoy.SB || 0);
    document.getElementById(`bb_perc_label_${bid}`).innerText = `${bbPerc}%`;
    document.getElementById(`sb_perc_label_${bid}`).innerText = `${sbPerc}%`;
    drawBar(`bb_bar_canvas_${bid}`, bbPerc, bbPerc >= 0 ? 'green' : 'red');
    drawBar(`sb_bar_canvas_${bid}`, sbPerc, sbPerc >= 0 ? 'green' : 'red');

    // Update battery bar
    const batteryFill = document.getElementById(`battery_fill_${bid}`);
    if (batteryFill) {
        const subVolt = parseFloat(buoy.SubVolt);
        if (!isNaN(subVolt)) {
            const pct = Math.max(0, Math.min(100, ((subVolt - 17.0) / 8.2) * 100)); // Adjusted to 17V-25V range
            batteryFill.style.width = `${pct}%`;
            batteryFill.style.background = pct > 20 ? 'green' : 'red';
        }
    }

    // Draw windrose arrows
    let tgDirForVector = isIdle ? null : buoy.TgDir;
    let windDirForVector = (isLocked && isClose) ? buoy.WDir : null;
    let gpsDirForVector = (!isIdle && isFar) ? buoy.GpsDir : null;

    drawWindrose(`compass_canvas_${bid}`, buoy.MagDir, tgDirForVector, windDirForVector, gpsDirForVector);

    // Update button states and text
    const lockBtn = document.getElementById(`lock_btn_${bid}`);
    const dockBtn = document.getElementById(`dock_btn_${bid}`);

    if (isLocked) {
        lockBtn.innerText = "IDLE";
        lockBtn.disabled = false;
        dockBtn.innerText = "DOCK";
        dockBtn.disabled = true;
    } else if (isDocking) { 
        lockBtn.innerText = "LOCK";
        lockBtn.disabled = true;
        dockBtn.innerText = "IDLE";
        dockBtn.disabled = false;
    } else if (isIdle) {
        lockBtn.innerText = "LOCK";
        lockBtn.disabled = false;
        dockBtn.innerText = "DOCK";
        dockBtn.disabled = false;
    } else { // Other states, disable both
        lockBtn.innerText = "LOCK";
        lockBtn.disabled = true;
        dockBtn.innerText = "DOCK";
        dockBtn.disabled = true;
    }

    // Re-highlight active tab button
    document.getElementById(`btn_buoy${bid}`).classList.add('active');
}

// Main data fetching logic
function fetchAndRenderData() {
  fetch('/data')
    .then(response => response.json())
    .then(data => {
        // Store data for all buoys
        data.buoys.forEach((buoy, index) => {
            currentBuoyData[index + 1] = buoy;
        });
        updateBuoyDisplay(); // Update display for the currently active buoy
    })
    .catch(error => console.error('Error fetching data:', error));
}

setInterval(fetchAndRenderData, 2000);
window.onload = () => { 
    openTab(null, 'Buoy1'); // Initialize with Buoy 1 active
    fetchAndRenderData(); 
}; // Fetch and render data on load
</script>
</body>
</html>
